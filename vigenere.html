<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 16px;
        }

        .container {
            width: 100%;
            max-width: 380px;
        }

        .mode-selector {
            display: flex;
            background: #0b0f19;
            padding: 4px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid #22314d;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        input[type="text"], textarea {
            width: 100%;
            background: #151f32;
            border: 1.5px solid #22314d;
            border-radius: 16px;
            color: var(--text);
            padding: 14px;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.15);
        }

        textarea {
            height: 90px;
            resize: none;
        }

        input[type="text"] {
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase; /* Forzar visualmente mayúsculas en la clave */
        }

        textarea[readonly] {
            background: #111a2e;
            color: #10b981;
            border-color: rgba(16, 185, 129, 0.2);
        }

        /* Indicador dinámico de longitud de clave */
        .key-stream-preview {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
            word-break: break-all;
            font-family: monospace;
            background: #0f172a;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px dashed #22314d;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Modo Cifrar / Descifrar -->
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-cifrar" onclick="setMode('cifrar')">Cifrar</button>
            <button class="mode-btn" id="btn-descifrar" onclick="setMode('descifrar')">Descifrar</button>
        </div>

        <!-- Campo para la Clave Secreta -->
        <div class="input-group">
            <label for="secret-key">Clave Secreta (Palabra)</label>
            <input type="text" id="secret-key" placeholder="Ej. PANAMIX" autocomplete="off" oninput="processText()">
            <div class="key-stream-preview" id="key-preview"></div>
        </div>

        <!-- Entrada de Texto -->
        <div class="input-group">
            <label for="input-text">Mensaje Original</label>
            <textarea id="input-text" placeholder="Escribe el mensaje aquí, mi pana..." oninput="processText()"></textarea>
        </div>

        <!-- Resultado seguro -->
        <div class="input-group">
            <label>Resultado Vigenère</label>
            <textarea id="output-text" readonly placeholder="Ingresa una clave y un mensaje..."></textarea>
        </div>
    </div>

    <script>
        let currentMode = 'cifrar';
        const secretKeyInput = document.getElementById('secret-key');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const keyPreview = document.getElementById('key-preview');

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-cifrar').classList.toggle('active', mode === 'cifrar');
            document.getElementById('btn-descifrar').classList.toggle('active', mode === 'descifrar');
            processText();
        }

        function processText() {
            const input = inputText.value;
            // Limpiamos la clave para quedarnos solo con letras (A-Z)
            const rawKey = secretKeyInput.value.toUpperCase().replace(/[^A-Z]/g, '');
            
            if (!rawKey || !input) {
                outputText.value = '';
                keyPreview.style.display = 'none';
                return;
            }

            // Mostrar una vista previa de cómo se repite la clave
            keyPreview.style.display = 'block';
            keyPreview.innerText = `Patrón de clave: ${rawKey.repeat(Math.ceil(input.length / rawKey.length)).substring(0, input.length)}`;

            let output = '';
            let keyIndex = 0;

            for (let i = 0; i < input.length; i++) {
                let char = input[i];
                
                if (char.match(/[a-z]/i)) {
                    const code = input.charCodeAt(i);
                    // Determinar el desplazamiento basado en la letra actual de la clave (A=0, B=1, etc.)
                    let shift = rawKey.charCodeAt(keyIndex % rawKey.length) - 65;
                    
                    // Si estamos descifrando, invertimos el desplazamiento
                    if (currentMode === 'descifrar') {
                        shift = (26 - shift) % 26;
                    }

                    // Mayúsculas
                    if (code >= 65 && code <= 90) {
                        char = String.fromCharCode(((code - 65 + shift) % 26) + 65);
                        keyIndex++; // Solo avanzamos la clave si es una letra válida
                    }
                    // Minúsculas
                    else if (code >= 97 && code <= 122) {
                        char = String.fromCharCode(((code - 97 + shift) % 26) + 97);
                        keyIndex++;
                    }
                }
                output += char;
            }

            outputText.value = output;
        }
    </script>
</body>
</html>
