<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CriptoPana Suite ⚡</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: #151f32;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            overflow: hidden; /* Evita scrolls extraños en el marco principal */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- BARRA SUPERIOR --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--panel-bg);
            border-bottom: 1px solid #22314d;
            height: 60px;
            z-index: 10;
        }

        .nav-title {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* BOTÓN HAMBURGUESA (Las 3 líneas animadas) */
        .menu-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            z-index: 100; /* Siempre visible sobre el panel */
        }

        .menu-btn span {
            width: 100%;
            height: 3px;
            background-color: var(--text);
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animación cuando el menú está abierto */
        .menu-btn.open span:nth-child(1) {
            transform: translateY(7.5px) rotate(45deg);
        }
        .menu-btn.open span:nth-child(2) {
            opacity: 0;
        }
        .menu-btn.open span:nth-child(3) {
            transform: translateY(-7.5px) rotate(-45deg);
        }

        /* --- PANEL LATERAL DESLIZANTE --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; /* Escondido por defecto a la izquierda */
            width: 280px;
            height: 100%;
            background: #0f172a;
            border-right: 1px solid #22314d;
            z-index: 90;
            padding: 80px 20px 20px 20px;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            left: 0; /* Se desliza hacia adentro */
        }

        .sidebar h2 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .menu-item:hover, .menu-item.active {
            background: #1e293b;
            color: var(--accent);
        }

        .menu-item span {
            margin-right: 12px;
        }

        /* Fondo oscuro translúcido que cubre la pantalla cuando el menú abre */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
            z-index: 80;
            display: none;
        }

        .overlay.visible {
            display: block;
        }

        /* --- CONTENEDOR DEL CONTENIDO INDEPENDIENTE --- */
        .content-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: var(--bg-color);
        }
    </style>
</head>
<body>

    <!-- Barra de navegación fija superior -->
    <nav class="navbar">
        <div class="menu-btn" id="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="nav-title" id="nav-title">La Ruedita</div>
        <div style="width: 24px;"></div> <!-- Contrapeso visual para centrar el título -->
    </nav>

    <!-- Fondo opaco para cliquear afuera del menú -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <!-- Menú Deslizable Lateral -->
    <div class="sidebar" id="sidebar">
        <h2>Criptografías</h2>
        <ul class="menu-list">
            <li class="menu-item active" onclick="loadTool('ruedita.html', 'La Ruedita', this)">
                <span>⭕</span> Cifrado César (Ruedita)
            </li>
            <li class="menu-item" onclick="loadTool('morse.html', 'Código Morse', this)">
                <span>📟</span> Código Morse Animado
            </li>
            <li class="menu-item" onclick="loadTool('vigenere.html', 'Cifrado Vigenère', this)">
                <span>🔑</span> Cifrado Vigenère
            </li>
        </ul>
    </div>

    <!-- Aquí se cargará dinámicamente cada archivo de GitHub sin recargar la página entera -->
    <iframe class="content-frame" id="app-loader" src="ruedita.html"></iframe>

    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menu-toggle');
        const overlay = document.getElementById('overlay');
        const appLoader = document.getElementById('app-loader');
        const navTitle = document.getElementById('nav-title');

        function toggleMenu() {
            sidebar.classList.toggle('open');
            menuToggle.classList.toggle('open');
            overlay.classList.toggle('visible');
        }

        function loadTool(url, name, element) {
            // Cambiar el archivo que se muestra
            appLoader.src = url;
            
            // Actualizar el título de la barra superior
            navTitle.innerText = name;
            
            // Cambiar la clase activa en el menú
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            // Cerrar el menú automáticamente en móviles tras elegir
            toggleMenu();
        }
    </script>
</body>
</html>
